<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Urgencias · Telefonía</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏥</text></svg>">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f0f4f8; --card-bg: #ffffff; --text: #1a202c; --text-secondary: #4a5568;
            --border: #e2e8f0; --input-bg: #f7fafc; --input-focus: #ffffff; --primary: #1e40af;
            --primary-light: #3b82f6; --accent: #3182ce; --success: #38a169; --warning: #d69e2e;
            --danger: #e53e3e; --info: #6b46c1; --shadow-sm: 0 1px 3px rgba(0,0,0,0.06);
            --shadow: 0 4px 6px rgba(0,0,0,0.07); --shadow-lg: 0 10px 25px rgba(0,0,0,0.1);
            --radius: 14px; --radius-sm: 8px; --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            --header-gradient: linear-gradient(135deg, #1a365d 0%, #2b6cb0 100%);
            --reanimation-red: #dc2626;
        }
        body.dark-mode {
            --bg: #0f172a; --card-bg: #1e293b; --text: #e2e8f0; --text-secondary: #94a3b8;
            --border: #334155; --input-bg: #1e293b; --input-focus: #1e293b;
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.3); --shadow: 0 4px 6px rgba(0,0,0,0.4);
            --shadow-lg: 0 10px 25px rgba(0,0,0,0.5); --header-gradient: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif; background: var(--bg); min-height: 100vh;
            color: var(--text); line-height: 1.6; transition: background 0.3s, color 0.3s;
        }
        .offline-banner {
            background: var(--danger); color: white; text-align: center; padding: 0.7rem;
            font-weight: 600; font-size: 0.9rem; display: none; animation: slideDown 0.3s ease;
        }
        @keyframes slideDown { from { transform: translateY(-100%); } to { transform: translateY(0); } }
        .header {
            background: var(--header-gradient); padding: 1rem 1.5rem; display: flex;
            align-items: center; justify-content: center; gap: 2.5rem;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15); flex-wrap: wrap; position: sticky; top: 0; z-index: 10;
            border-bottom: 3px solid rgba(255,255,255,0.1);
        }
        .header img { height: 44px; object-fit: contain; transition: transform var(--transition); filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3)); }
        .header img:hover { transform: scale(1.08); }
        .header-controls { margin-left: auto; display: flex; gap: 0.5rem; align-items: center; flex-wrap: wrap; }
        .theme-toggle, .nav-btn {
            background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.25); color: white;
            padding: 0.5rem 1rem; border-radius: 2rem; cursor: pointer; font-size: 0.85rem; font-weight: 500;
            transition: all var(--transition); display: flex; align-items: center; gap: 0.4rem; backdrop-filter: blur(10px);
        }
        .nav-btn { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); padding: 0.5rem 1.2rem; }
        .theme-toggle:hover, .nav-btn:hover { background: rgba(255,255,255,0.25); }
        .nav-btn.active { background: rgba(255,255,255,0.3); border-color: rgba(255,255,255,0.5); }
        @media (max-width: 700px) {
            .header { gap: 1rem; padding: 0.8rem 1rem; }
            .header img { height: 30px; }
            .header-controls { margin-left: 0; justify-content: center; }
            .nav-btn { font-size: 0.75rem; padding: 0.4rem 0.8rem; }
        }
        .container { max-width: 1100px; margin: 1.5rem auto; padding: 0 1rem; }
        .card {
            background: var(--card-bg); border-radius: var(--radius); padding: 2rem;
            box-shadow: var(--shadow); margin-bottom: 1.5rem; border: 1px solid var(--border);
            transition: all var(--transition); position: relative; overflow: hidden;
        }
        .card::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; height: 4px;
            background: linear-gradient(90deg, var(--primary-light), var(--info), var(--success)); opacity: 0.8;
        }
        .card-header {
            font-size: 1.3rem; font-weight: 700; color: var(--primary); margin-bottom: 1.8rem;
            display: flex; align-items: center; gap: 0.6rem; border-bottom: 2px solid var(--border); padding-bottom: 0.8rem;
        }
        .card-header i { font-size: 1.5rem; }
        body.dark-mode .card-header { color: var(--primary-light); }
        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(270px, 1fr)); gap: 1.3rem; }
        .full-width { grid-column: 1 / -1; }
        label { display: block; font-weight: 600; margin-bottom: 0.35rem; color: var(--text); font-size: 0.88rem; }
        label .required { color: var(--danger); font-weight: 700; }
        input, select, textarea {
            width: 100%; padding: 0.75rem 1rem; border: 1.5px solid var(--border);
            border-radius: var(--radius-sm); font-size: 0.95rem; transition: all var(--transition);
            background: var(--input-bg); color: var(--text); font-family: 'Inter', sans-serif;
        }
        input:focus, select:focus, textarea:focus {
            border-color: var(--accent); background: var(--input-focus); outline: none;
            box-shadow: 0 0 0 4px rgba(49,130,206,0.12); transform: translateY(-1px);
        }
        input[readonly] { background: var(--border); cursor: not-allowed; opacity: 0.75; }
        textarea { resize: vertical; min-height: 60px; }
        .checkbox-group, .radio-group { display: flex; align-items: center; gap: 0.5rem; margin-top: 0.5rem; font-size: 0.9rem; }
        .radio-group { gap: 2rem; margin: 0.5rem 0; padding: 0.6rem; background: var(--input-bg); border-radius: var(--radius-sm); border: 1px solid var(--border); }
        input[type="checkbox"], input[type="radio"] { width: 1.2rem; height: 1.2rem; accent-color: var(--accent); cursor: pointer; }
        .btn {
            padding: 0.75rem 1.5rem; border: none; border-radius: 2rem; font-size: 0.9rem; font-weight: 600;
            cursor: pointer; display: inline-flex; align-items: center; gap: 0.5rem; transition: all var(--transition);
            color: white; letter-spacing: 0.3px; box-shadow: var(--shadow-sm);
        }
        .btn:active { transform: scale(0.97); }
        .btn-primary { background: linear-gradient(135deg, #2b6cb0, #3182ce); }
        .btn-success { background: linear-gradient(135deg, #38a169, #48bb78); }
        .btn-warning { background: linear-gradient(135deg, #d69e2e, #ecc94b); color: #1a202c; }
        .btn-danger { background: linear-gradient(135deg, #e53e3e, #fc8181); }
        .btn-info { background: linear-gradient(135deg, #6b46c1, #9f7aea); }
        .btn-sm { padding: 0.45rem 1rem; font-size: 0.8rem; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .reanimation-section {
            background: linear-gradient(135deg, rgba(220,38,38,0.06), rgba(239,68,68,0.08));
            border: 2px solid rgba(220,38,38,0.3); border-radius: var(--radius-sm); padding: 1.2rem;
            margin-top: 0.8rem; animation: borderPulse 2s infinite;
        }
        @keyframes borderPulse { 0%,100% { border-color: rgba(220,38,38,0.3); } 50% { border-color: rgba(220,38,38,0.6); } }
        .reanimation-section label { color: var(--reanimation-red); font-weight: 700; }
        .counter { font-size: 0.75rem; color: var(--text-secondary); margin-left: 0.4rem; }
        .age-display {
            font-size: 1.2rem; font-weight: 700; color: var(--primary-light);
            background: linear-gradient(135deg, rgba(49,130,206,0.08), rgba(107,70,193,0.08));
            padding: 0.8rem; border-radius: var(--radius-sm); text-align: center; border: 2px dashed var(--accent);
        }
        .pending-list { max-height: 450px; overflow-y: auto; border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 0.8rem; background: var(--input-bg); }
        .history-item {
            display: flex; justify-content: space-between; align-items: center; padding: 0.9rem;
            background: var(--card-bg); border-radius: var(--radius-sm); margin-bottom: 0.6rem;
            box-shadow: var(--shadow-sm); transition: all var(--transition); border-left: 4px solid var(--accent);
        }
        .history-item.reanimation { border-left-color: var(--reanimation-red); border-left-width: 5px; }
        .history-item:hover { transform: translateX(3px); box-shadow: var(--shadow); }
        .badge-reanimation {
            background: var(--reanimation-red); color: white; padding: 0.2rem 0.6rem;
            border-radius: 1rem; font-size: 0.7rem; font-weight: 700; text-transform: uppercase;
            animation: pulseBadge 2s infinite;
        }
        @keyframes pulseBadge { 0%,100% { opacity: 1; } 50% { opacity: 0.7; } }
        .search-box { display: flex; gap: 0.5rem; margin-bottom: 1rem; flex-wrap: wrap; }
        .search-box input { flex: 1; min-width: 200px; padding: 0.7rem 1rem; border-radius: 2rem; }
        .search-box select { width: auto; min-width: 150px; border-radius: 2rem; }
        .toast {
            position: fixed; bottom: 2rem; right: 2rem; background: var(--primary); color: white;
            padding: 1rem 1.5rem; border-radius: 1rem; box-shadow: var(--shadow-lg); z-index: 1000;
            animation: slideInRight 0.35s ease; font-weight: 600; max-width: 90vw;
        }
        @keyframes slideInRight { from { transform: translateX(120%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        .hidden { display: none !important; }
        .section-separator { border-top: 2px dashed var(--border); margin: 1.2rem 0; grid-column: 1 / -1; }
        .hospital-badge {
            display: inline-flex; align-items: center; gap: 0.5rem;
            background: linear-gradient(135deg, rgba(49,130,206,0.12), rgba(107,70,193,0.12));
            padding: 0.4rem 1rem; border-radius: 2rem; font-size: 0.8rem; font-weight: 600;
            color: var(--primary-light); margin-bottom: 0.5rem;
        }
        .loading-spinner {
            text-align: center; padding: 2rem;
        }
        .loading-spinner i { font-size: 2rem; color: var(--accent); }
        @media (max-width: 768px) {
            .form-grid { grid-template-columns: 1fr; }
            .card { padding: 1.5rem; }
        }
        input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; }
    </style>
</head>
<body>

<div class="offline-banner" id="offlineBanner">
    <i class="fas fa-wifi-slash"></i> Sin conexión · Registros guardados localmente
</div>

<header class="header">
    <img src="https://i.ibb.co/qFk65j2s/LOGO-HOSPITAL.png" alt="Hospital">
    <img src="https://i.ibb.co/CKhvCqbc/LOGO-HC-DIGITAL.png" alt="HC Digital">
    <img src="https://i.ibb.co/hRm3C7xv/DEEM.png" alt="DEEM">
    <div class="header-controls">
        <button class="nav-btn active" id="btnNavForm"><i class="fas fa-user-plus"></i> Carga</button>
        <button class="nav-btn" id="btnNavHistory"><i class="fas fa-search"></i> Consultar</button>
        <button class="nav-btn" id="btnNavPending"><i class="fas fa-clock"></i> Pendientes</button>
        <button class="theme-toggle" id="themeToggle">
            <i class="fas fa-moon"></i> <span id="themeLabel">Oscuro</span>
        </button>
    </div>
</header>

<div class="container">
    <!-- FORMULARIO DE CARGA -->
    <div class="card" id="formCard">
        <div class="card-header"><i class="fas fa-hospital-user"></i> REGISTRO DE PACIENTES · TELEFONÍA</div>
        <div class="hospital-badge"><i class="fas fa-ambulance"></i> Módulo de Carga · Área de Urgencias</div>
        <div class="form-grid">
            <div class="field-group"><label><i class="far fa-calendar-alt"></i> Fecha</label><input type="text" id="fecha" readonly></div>
            <div class="field-group"><label><i class="far fa-clock"></i> Hora</label><input type="text" id="hora" readonly></div>
            <div class="field-group full-width">
                <label><i class="fas fa-truck-medical"></i> Tipo de ingreso</label>
                <div class="radio-group">
                    <div class="radio-item"><input type="radio" id="tipoAmbulatorio" name="tipoIngreso" value="Ambulatorio" checked><label for="tipoAmbulatorio">🚶 Ambulatorio</label></div>
                    <div class="radio-item"><input type="radio" id="tipoAmbulancia" name="tipoIngreso" value="Ambulancia"><label for="tipoAmbulancia">🚑 Ambulancia</label></div>
                </div>
            </div>
            <div class="field-group"><label><i class="fas fa-user"></i> Apellido y Nombre <span class="required">*</span></label><input type="text" id="nombre" placeholder="INGRESE APELLIDO Y NOMBRE" style="text-transform: uppercase;" autocomplete="off"></div>
            <div class="field-group"><label><i class="fas fa-id-card"></i> DNI <span class="required">*</span></label><input type="text" id="dni" maxlength="11" placeholder="SIN PUNTOS NI LETRAS" inputmode="numeric" pattern="[0-9]*" autocomplete="off" onkeypress="return event.charCode >= 48 && event.charCode <= 57"></div>
            <div class="field-group">
                <label><i class="fas fa-cake-candles"></i> Fecha Nac. <span class="required">*</span></label>
                <div style="display:flex;gap:0.5rem;"><input type="text" id="nacimiento" placeholder="dd/mm/aaaa" maxlength="10" style="flex:1;" autocomplete="off"><button type="button" class="btn btn-info btn-sm" id="btnConfirmarFecha"><i class="fas fa-check-circle"></i> Confirmar</button></div>
            </div>
            <div class="field-group"><label><i class="fas fa-calculator"></i> Edad</label><div class="age-display" id="edadDisplay">—</div></div>
            <div class="field-group full-width"><label><i class="fas fa-clipboard-list"></i> Razón de Urgencia <span class="required">*</span></label><textarea id="razon" rows="2" maxlength="50" placeholder="MOTIVO DE CONSULTA (MÁX. 50 CARACTERES)" style="text-transform: uppercase;"></textarea><span class="counter" id="contadorRazon">0/50</span></div>
            <div class="field-group"><label><i class="fas fa-phone"></i> Teléfono</label><input type="text" id="telefono" inputmode="numeric" pattern="[0-9]*" autocomplete="off" onkeypress="return event.charCode >= 48 && event.charCode <= 57"><div class="checkbox-group"><input type="checkbox" id="sinTelefono"><label for="sinTelefono">Sin teléfono</label></div></div>
            <div class="field-group"><label><i class="fas fa-hospital"></i> Obra Social</label><input type="text" id="obraSocial" style="text-transform: uppercase;"><div class="checkbox-group"><input type="checkbox" id="sinObraSocial"><label for="sinObraSocial">Sin obra social</label></div></div>
            <div class="field-group"><label><i class="fas fa-map-marker-alt"></i> Domicilio</label><input type="text" id="domicilio" style="text-transform: uppercase;"><div class="checkbox-group"><input type="checkbox" id="sinDomicilio"><label for="sinDomicilio">Sin domicilio</label></div></div>
            <div class="full-width" id="seccionAmbulancia" style="display:none;">
                <div class="section-separator"></div>
                <div class="form-grid">
                    <div class="field-group"><label><i class="fas fa-ambulance"></i> Ambulancia</label><input type="text" id="ambulanciaNombre" style="text-transform: uppercase;"></div>
                    <div class="field-group" style="align-self:center;"><div class="checkbox-group"><input type="checkbox" id="ambulanciaInterior"><label for="ambulanciaInterior">Proviene del interior</label></div></div>
                    <div class="field-group full-width" id="grupoDepartamento" style="display:none;"><label><i class="fas fa-map"></i> Departamento</label><select id="departamento"><option value="">Seleccione...</option><option>AMBATO</option><option>ANCASTI</option><option>ANDALGALÁ</option><option>ANTOFAGASTA DE LA SIERRA</option><option>BELÉN</option><option>CAPAYÁN</option><option>EL ALTO</option><option>FRAY MAMERTO ESQUIÚ</option><option>LA PAZ</option><option>PACLÍN</option><option>POMÁN</option><option>SANTA MARÍA</option><option>SANTA ROSA</option><option>TINOGASTA</option><option>VALLE VIEJO</option></select></div>
                    <div class="full-width reanimation-section" id="seccionReanimacion" style="display:none;">
                        <label><i class="fas fa-heart-pulse"></i> ¿ES REANIMACIÓN?</label>
                        <div class="radio-group" style="border-color:rgba(220,38,38,0.3);"><div class="radio-item"><input type="radio" id="reanimacionSi" name="esReanimacion" value="SI"><label for="reanimacionSi" style="color:var(--reanimation-red);font-weight:700;">⚠️ SÍ</label></div><div class="radio-item"><input type="radio" id="reanimacionNo" name="esReanimacion" value="NO" checked><label for="reanimacionNo">NO</label></div></div>
                    </div>
                </div>
            </div>
        </div>
        <div style="display:flex;gap:1rem;flex-wrap:wrap;margin-top:2.2rem;border-top:1px solid var(--border);padding-top:1.5rem;">
            <button class="btn btn-primary" id="btnGuardar"><i class="fas fa-save"></i> Guardar</button>
            <button class="btn btn-success" id="btnLimpiar"><i class="fas fa-undo-alt"></i> Limpiar</button>
        </div>
    </div>

    <!-- CONSULTA DESDE EXCEL -->
    <div class="card hidden" id="historyCard">
        <div class="card-header"><i class="fas fa-database"></i> CONSULTA DE REGISTROS · GOOGLE SHEETS</div>
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Buscar por nombre, DNI, razón, fecha...">
            <select id="searchFilter">
                <option value="todos">Todos los campos</option>
                <option value="nombre">Nombre</option>
                <option value="dni">DNI</option>
                <option value="razon">Razón</option>
                <option value="fecha">Fecha (dd/mm/aaaa)</option>
            </select>
            <button class="btn btn-info btn-sm" id="btnSearch"><i class="fas fa-search"></i> Buscar en Sheets</button>
            <button class="btn btn-success btn-sm" id="btnLoadAll"><i class="fas fa-list"></i> Cargar últimos</button>
        </div>
        <div id="historyList" class="pending-list">
            <p style="text-align:center;color:var(--text-secondary);padding:2rem;">
                <i class="fas fa-search" style="font-size:3rem;display:block;margin-bottom:1rem;opacity:0.5;"></i>
                Realice una búsqueda o cargue los últimos registros
            </p>
        </div>
    </div>

    <!-- PENDIENTES -->
    <div class="card hidden" id="panelPendientes">
        <div class="card-header"><i class="fas fa-cloud-upload-alt"></i> Pendientes de sincronizar</div>
        <div id="listaPendientes" class="pending-list"></div>
        <div style="margin-top:1.2rem;display:flex;gap:1rem;flex-wrap:wrap;">
            <button class="btn btn-primary" id="btnSyncAll"><i class="fas fa-sync-alt"></i> Sincronizar</button>
            <button class="btn btn-danger" id="btnClearAll"><i class="fas fa-trash-alt"></i> Eliminar todos</button>
        </div>
    </div>
</div>

<div id="toastContainer"></div>

<script src="config.js"></script>
<script>
    if (typeof APPS_SCRIPT_URL === 'undefined' || APPS_SCRIPT_URL === '') console.error('config.js no cargado.');
    if (typeof API_TOKEN === 'undefined' || API_TOKEN === '') console.error('API_TOKEN no definido.');

    let pendingRecords = JSON.parse(localStorage.getItem('pendingRecords') || '[]');
    const isOnline = () => navigator.onLine;

    // MODO OSCURO
    const themeToggle = document.getElementById('themeToggle');
    const themeLabel = document.getElementById('themeLabel');
    const themeIcon = themeToggle.querySelector('i');
    if (localStorage.getItem('darkMode') === 'true') {
        document.body.classList.add('dark-mode');
        themeIcon.className = 'fas fa-sun'; themeLabel.textContent = 'Claro';
    }
    themeToggle.addEventListener('click', () => {
        const isDark = document.body.classList.toggle('dark-mode');
        localStorage.setItem('darkMode', isDark);
        themeIcon.className = isDark ? 'fas fa-sun' : 'fas fa-moon';
        themeLabel.textContent = isDark ? 'Claro' : 'Oscuro';
    });

    // NAVEGACIÓN
    const formCard = document.getElementById('formCard');
    const historyCard = document.getElementById('historyCard');
    const panelPendientes = document.getElementById('panelPendientes');
    const btnNavForm = document.getElementById('btnNavForm');
    const btnNavHistory = document.getElementById('btnNavHistory');
    const btnNavPending = document.getElementById('btnNavPending');
    function mostrarSeccion(s) {
        [formCard, historyCard, panelPendientes].forEach(c => c.classList.add('hidden'));
        [btnNavForm, btnNavHistory, btnNavPending].forEach(b => b.classList.remove('active'));
        if (s === 'form') { formCard.classList.remove('hidden'); btnNavForm.classList.add('active'); }
        if (s === 'history') { historyCard.classList.remove('hidden'); btnNavHistory.classList.add('active'); }
        if (s === 'pending') { panelPendientes.classList.remove('hidden'); btnNavPending.classList.add('active'); actualizarListaPendientes(); }
    }
    btnNavForm.addEventListener('click', () => mostrarSeccion('form'));
    btnNavHistory.addEventListener('click', () => mostrarSeccion('history'));
    btnNavPending.addEventListener('click', () => mostrarSeccion('pending'));

    // RELOJ
    function actualizarReloj() {
        const ahora = new Date();
        document.getElementById('fecha').value = ahora.toLocaleDateString('es-AR', {day:'2-digit', month:'2-digit', year:'numeric'});
        document.getElementById('hora').value = ahora.toLocaleTimeString('es-AR', {hour:'2-digit', minute:'2-digit', second:'2-digit'});
    }
    setInterval(actualizarReloj, 1000); actualizarReloj();

    // TOAST
    function mostrarToast(mensaje, tipo = 'info') {
        const cont = document.getElementById('toastContainer');
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.style.background = tipo === 'error' ? '#e53e3e' : '#2b6cb0';
        toast.innerHTML = `<i class="fas fa-${tipo === 'error' ? 'exclamation-circle' : 'check-circle'}"></i> ${mensaje}`;
        cont.appendChild(toast);
        setTimeout(() => { toast.style.opacity = '0'; toast.style.transition = 'opacity 0.3s'; setTimeout(() => toast.remove(), 300); }, 3500);
    }

    // FORMATO FECHA
    document.getElementById('nacimiento').addEventListener('input', function(e) {
        let val = e.target.value.replace(/\D/g, '');
        if (val.length > 8) val = val.slice(0,8);
        let formatted = '';
        if (val.length > 4) formatted = val.slice(0,2) + '/' + val.slice(2,4) + '/' + val.slice(4);
        else if (val.length > 2) formatted = val.slice(0,2) + '/' + val.slice(2);
        else formatted = val;
        e.target.value = formatted;
    });
    document.getElementById('btnConfirmarFecha').addEventListener('click', () => {
        const v = document.getElementById('nacimiento').value.trim();
        if (!/^\d{2}\/\d{2}\/\d{4}$/.test(v)) return mostrarToast('Formato dd/mm/aaaa', 'error');
        const [d,m,a] = v.split('/').map(Number);
        const fn = new Date(a,m-1,d), hoy = new Date();
        if (fn.getDate() !== d || fn.getMonth() !== m-1 || fn > hoy) return mostrarToast('Fecha inválida', 'error');
        let edad = hoy.getFullYear() - fn.getFullYear();
        if (hoy.getMonth() < fn.getMonth() || (hoy.getMonth() === fn.getMonth() && hoy.getDate() < fn.getDate())) edad--;
        document.getElementById('edadDisplay').textContent = `${edad} años`;
    });
    document.getElementById('razon').addEventListener('input', e => document.getElementById('contadorRazon').textContent = `${e.target.value.length}/50`);

    function configurarToggle(cb, f) {
        document.getElementById(cb).addEventListener('change', () => {
            const field = document.getElementById(f);
            if (document.getElementById(cb).checked) { field.value = 'NN'; field.disabled = true; field.style.background = 'var(--border)'; }
            else { field.value = ''; field.disabled = false; field.style.background = ''; }
        });
    }
    configurarToggle('sinTelefono', 'telefono');
    configurarToggle('sinObraSocial', 'obraSocial');
    configurarToggle('sinDomicilio', 'domicilio');
    document.querySelectorAll('input[name="tipoIngreso"]').forEach(r => r.addEventListener('change', function() {
        const a = this.value === 'Ambulancia';
        document.getElementById('seccionAmbulancia').style.display = a ? 'block' : 'none';
        document.getElementById('seccionReanimacion').style.display = a ? 'block' : 'none';
    }));
    document.getElementById('ambulanciaInterior').addEventListener('change', function() {
        document.getElementById('grupoDepartamento').style.display = this.checked ? 'block' : 'none';
        document.getElementById('ambulanciaNombre').style.display = this.checked ? 'none' : 'block';
    });

    // GUARDAR
    document.getElementById('btnGuardar').addEventListener('click', () => {
        const nombre = document.getElementById('nombre').value.trim();
        const dni = document.getElementById('dni').value.trim();
        const nac = document.getElementById('nacimiento').value.trim();
        const edad = document.getElementById('edadDisplay').textContent;
        const razon = document.getElementById('razon').value.trim();
        if (!nombre) return mostrarToast('Complete Nombre', 'error');
        if (!dni || !/^\d{7,11}$/.test(dni)) return mostrarToast('DNI inválido', 'error');
        if (!/^\d{2}\/\d{2}\/\d{4}$/.test(nac)) return mostrarToast('Fecha incorrecta', 'error');
        if (edad === '—') return mostrarToast('Confirme la fecha', 'error');
        if (!razon) return mostrarToast('Ingrese razón', 'error');
        const tipo = document.querySelector('input[name="tipoIngreso"]:checked').value;
        let amb = '', dep = '', rea = 'NO';
        if (tipo === 'Ambulancia') {
            rea = document.querySelector('input[name="esReanimacion"]:checked').value;
            if (document.getElementById('ambulanciaInterior').checked) {
                dep = document.getElementById('departamento').value; amb = dep;
                if (!dep) return mostrarToast('Seleccione departamento', 'error');
            } else { amb = document.getElementById('ambulanciaNombre').value.trim(); if (!amb) return mostrarToast('Ingrese ambulancia', 'error'); }
        }
        const r = {
            fecha: document.getElementById('fecha').value, hora: document.getElementById('hora').value,
            nombre: nombre.toUpperCase(), dni, nacimiento: nac, edad: edad.replace(' años',''),
            razon: razon.toUpperCase(),
            telefono: (document.getElementById('telefono').value.trim() || (document.getElementById('sinTelefono').checked ? 'NN' : '')).toUpperCase(),
            obraSocial: (document.getElementById('obraSocial').value.trim() || (document.getElementById('sinObraSocial').checked ? 'NN' : '')).toUpperCase(),
            domicilio: (document.getElementById('domicilio').value.trim() || (document.getElementById('sinDomicilio').checked ? 'NN' : '')).toUpperCase(),
            tipoIngreso: tipo, ambulancia: amb.toUpperCase(), departamento: dep.toUpperCase(), esReanimacion: rea, token: API_TOKEN
        };
        if (isOnline() && APPS_SCRIPT_URL) enviarRegistro(r);
        else { guardarPendiente(r); mostrarToast('Guardado localmente'); }
    });

    async function enviarRegistro(r) {
        try {
            await fetch(APPS_SCRIPT_URL, { method:'POST', body: JSON.stringify(r), headers: {'Content-Type':'application/json'}, mode:'no-cors' });
            mostrarToast('Registro guardado'); limpiarFormulario();
        } catch(e) { guardarPendiente(r); mostrarToast('Error. Guardado pendiente.', 'error'); }
    }
    async function enviarRegistroSinGuardar(r) {
        await fetch(APPS_SCRIPT_URL, { method:'POST', body: JSON.stringify(r), headers: {'Content-Type':'application/json'}, mode:'no-cors' });
    }
    function guardarPendiente(r) { pendingRecords.push({...r, timestamp: Date.now()}); localStorage.setItem('pendingRecords', JSON.stringify(pendingRecords)); actualizarListaPendientes(); }
    function limpiarFormulario() {
        ['nombre','dni','nacimiento','razon','telefono','obraSocial','domicilio'].forEach(id => { document.getElementById(id).value = ''; document.getElementById(id).disabled = false; document.getElementById(id).style.background = ''; });
        document.getElementById('edadDisplay').textContent = '—';
        document.getElementById('contadorRazon').textContent = '0/50';
        ['sinTelefono','sinObraSocial','sinDomicilio'].forEach(id => document.getElementById(id).checked = false);
        document.querySelector('input[value="Ambulatorio"]').checked = true;
        document.getElementById('seccionAmbulancia').style.display = 'none';
        document.getElementById('seccionReanimacion').style.display = 'none';
        document.getElementById('ambulanciaInterior').checked = false;
        document.getElementById('grupoDepartamento').style.display = 'none';
        document.querySelector('input[value="NO"]').checked = true;
    }
    document.getElementById('btnLimpiar').addEventListener('click', limpiarFormulario);

    // PENDIENTES
    function actualizarListaPendientes() {
        const c = document.getElementById('listaPendientes'); c.innerHTML = '';
        if (!pendingRecords.length) { c.innerHTML = '<p style="text-align:center;color:var(--text-secondary);padding:1.5rem;">Sin pendientes</p>'; return; }
        pendingRecords.forEach((r,i) => {
            const d = document.createElement('div'); d.className = 'history-item';
            if (r.esReanimacion === 'SI') d.classList.add('reanimation');
            d.innerHTML = `<div><strong>${r.nombre}</strong> · DNI ${r.dni} ${r.esReanimacion==='SI'?'<span class="badge-reanimation">REANIMACIÓN</span>':''}<br><small>${r.fecha} ${r.hora} — ${r.razon}</small></div><button class="btn btn-danger btn-sm" data-idx="${i}"><i class="fas fa-trash"></i></button>`;
            d.querySelector('button').addEventListener('click', () => { pendingRecords.splice(i,1); localStorage.setItem('pendingRecords', JSON.stringify(pendingRecords)); actualizarListaPendientes(); });
            c.appendChild(d);
        });
    }
    document.getElementById('btnClearAll').addEventListener('click', () => { if (pendingRecords.length && confirm('¿Eliminar todos?')) { pendingRecords = []; localStorage.setItem('pendingRecords', '[]'); actualizarListaPendientes(); } });
    document.getElementById('btnSyncAll').addEventListener('click', async () => {
        if (!isOnline()) return mostrarToast('Sin conexión', 'error');
        if (!pendingRecords.length) return;
        const btn = document.getElementById('btnSyncAll'); btn.disabled = true; btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';
        let ok = 0; const fail = [];
        for (const r of pendingRecords) { try { await enviarRegistroSinGuardar(r); ok++; } catch(e) { fail.push(r); } }
        pendingRecords = fail; localStorage.setItem('pendingRecords', JSON.stringify(pendingRecords)); actualizarListaPendientes();
        btn.disabled = false; btn.innerHTML = '<i class="fas fa-sync-alt"></i> Sincronizar';
        mostrarToast(`${ok} ok, ${fail.length} pendientes`);
    });

    // BUSCAR EN GOOGLE SHEETS
    async function buscarEnSheets(query, filter) {
        const histDiv = document.getElementById('historyList');
        histDiv.innerHTML = '<div class="loading-spinner"><i class="fas fa-spinner fa-spin"></i><p>Consultando Google Sheets...</p></div>';
        try {
            const params = new URLSearchParams({ action:'search', query, filter, token: API_TOKEN });
            const res = await fetch(`${APPS_SCRIPT_URL}?${params.toString()}`);
            const data = await res.json();
            if (data.result !== 'success') throw new Error(data.error);
            mostrarResultados(data.data);
        } catch(e) {
            histDiv.innerHTML = `<p style="text-align:center;color:var(--danger);padding:2rem;"><i class="fas fa-exclamation-triangle"></i> Error: ${e.message}</p>`;
        }
    }

    function mostrarResultados(registros) {
        const c = document.getElementById('historyList'); c.innerHTML = '';
        if (!registros.length) { c.innerHTML = '<p style="text-align:center;color:var(--text-secondary);padding:2rem;">Sin resultados</p>'; return; }
        registros.forEach(r => {
            const d = document.createElement('div'); d.className = 'history-item';
            if (r.esReanimacion === 'SI') d.classList.add('reanimation');
            d.innerHTML = `<div><strong>${r.nombre}</strong> · DNI ${r.dni} · ${r.edad} años ${r.esReanimacion==='SI'?'<span class="badge-reanimation">REANIMACIÓN</span>':''}<br><small>${r.fecha} ${r.hora} — ${r.razon} | ${r.tipoIngreso}${r.tipoIngreso==='Ambulancia'?' · '+r.ambulancia:''}</small><br><small>📞 ${r.telefono} | 🏥 ${r.obraSocial} | 📍 ${r.domicilio}</small></div>`;
            c.appendChild(d);
        });
        mostrarToast(`${registros.length} resultado(s)`);
    }

    document.getElementById('btnSearch').addEventListener('click', () => {
        const q = document.getElementById('searchInput').value.trim();
        const f = document.getElementById('searchFilter').value;
        if (!q) return mostrarToast('Ingrese un término de búsqueda', 'error');
        buscarEnSheets(q, f);
    });
    document.getElementById('searchInput').addEventListener('keypress', e => { if (e.key === 'Enter') document.getElementById('btnSearch').click(); });
    document.getElementById('btnLoadAll').addEventListener('click', () => buscarEnSheets('', 'todos'));

    // CONEXIÓN
    window.addEventListener('online', () => { document.getElementById('offlineBanner').style.display = 'none'; if (pendingRecords.length) mostrarToast('Hay pendientes para sincronizar'); });
    window.addEventListener('offline', () => document.getElementById('offlineBanner').style.display = 'block');
    if (!isOnline()) document.getElementById('offlineBanner').style.display = 'block';

    // SW
    if ('serviceWorker' in navigator) window.addEventListener('load', () => navigator.serviceWorker.register('sw.js').then(() => {}).catch(() => {}));

    actualizarListaPendientes();
</script>
</body>
</html>
